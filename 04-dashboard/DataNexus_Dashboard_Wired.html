const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ═══════════════════════════════════════════════════════════════
// API CLIENT — talks to the real FastAPI service
// ═══════════════════════════════════════════════════════════════


// Local Docker MVP default: API is exposed on localhost:18000.
// If an older browser session saved localhost:8000, migrate it automatically.
if (localStorage.getItem('dn_api_url') === 'http://localhost:18000') {
  localStorage.setItem('dn_api_url', 'http://localhost:18000');
}

const DEFAULT_CONFIG = {
  apiUrl:  (localStorage.getItem('dn_api_url') === 'http://localhost:18000' ? 'http://localhost:18000' : (localStorage.getItem('dn_api_url') || 'http://localhost:18000')),
  apiKey:  localStorage.getItem('dn_api_key')  || '',
  token:   localStorage.getItem('dn_token')    || '',
};

class ApiClient {
  constructor(config) {
    this.apiUrl = config.apiUrl.replace(/\/$/, '');
    this.apiKey = config.apiKey;
    this.token  = config.token;
    this.lastError = null;
    this.online = null;
  }

  setApiUrl(url) {
    this.apiUrl = url.replace(/\/$/, '');
    localStorage.setItem('dn_api_url', this.apiUrl);
  }
  setToken(token) {
    this.token = token;
    if (token) localStorage.setItem('dn_token', token);
    else localStorage.removeItem('dn_token');
  }
  setApiKey(key) {
    this.apiKey = key;
    if (key) localStorage.setItem('dn_api_key', key);
    else localStorage.removeItem('dn_api_key');
  }

  _headers(extra = {}) {
    const h = { 'Content-Type': 'application/json', ...extra };
    if (this.token)  h['Authorization'] = `Bearer ${this.token}`;
    if (this.apiKey) h['X-DataNexus-API-Key'] = this.apiKey;
    return h;
  }

  async _request(method, path, { body, timeout = 10000 } = {}) {
    const url = `${this.apiUrl}${path}`;
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeout);
    try {
      const resp = await fetch(url, {
        method,
        headers: this._headers(),
        body: body ? JSON.stringify(body) : undefined,
        signal: controller.signal,
      });
      clearTimeout(timer);
      this.online = true;
      this.lastError = null;
      const text = await resp.text();
      const data = text ? JSON.parse(text) : {};
      if (!resp.ok) {
        const err = new Error(data.detail || resp.statusText);
        err.status = resp.status;
        err.body   = data;
        throw err;
      }
      return data;
    } catch (e) {
      clearTimeout(timer);
      if (e.name === 'AbortError') {
        this.online = false;
        this.lastError = 'Request timed out — is the API running?';
      } else if (e.message === 'Failed to fetch') {
        this.online = false;
        this.lastError = `Cannot reach ${this.apiUrl} — is the API running?`;
      } else {
        this.lastError = e.message || String(e);
      }
      throw e;
    }
  }

  // ─── Auth ──────────────────────────────────────────────
  login(username, password) {
    return this._request('POST', '/auth/login', { body: { username, password } });
  }
  me() { return this._request('GET', '/auth/me'); }

  // ─── Health ────────────────────────────────────────────
  health() { return this._request('GET', '/health', { timeout: 3000 }); }
  ready()  { return this._request('GET', '/ready',  { timeout: 5000 }); }
  apiStatus() { return this._request('GET', '/api/status', { timeout: 3000 }); }

  // ─── Ingest ────────────────────────────────────────────
  ingest(payload) { return this._request('POST', '/api/v1/ingest', { body: payload }); }

  // ─── Lineage / Datasets ────────────────────────────────
  getLineage(datasetId) { return this._request('GET', `/api/v1/lineage/${encodeURIComponent(datasetId)}`); }
  getDataset(datasetId) { return this._request('GET', `/api/v1/dataset/${encodeURIComponent(datasetId)}`); }

  // ─── Compliance ────────────────────────────────────────
  borderCheck(payload) { return this._request('POST', '/api/v1/compliance/border', { body: payload }); }
  complianceReport(datasetId) {
    return this._request('GET', `/api/v1/compliance/report/${encodeURIComponent(datasetId)}`);
  }

  // ─── Query ─────────────────────────────────────────────
  nlpQuery(payload) { return this._request('POST', '/api/v1/query/nlp', { body: payload }); }

  // ─── Pipeline / Intent ─────────────────────────────────
  submitIntent(payload) { return this._request('POST', '/api/v1/pipeline/intent', { body: payload }); }

  // ─── Fabric ────────────────────────────────────────────
  fabricStatus() { return this._request('GET', '/api/v1/fabric/status'); }

  // ─── Dashboard Live APIs ───────────────────────────────
  dashboardOverview() { return this._request('GET', '/api/v1/dashboard/overview'); }
  dashboardPipelines() { return this._request('GET', '/api/v1/dashboard/pipelines'); }
  dashboardAuditRecent() { return this._request('GET', '/api/v1/dashboard/audit/recent'); }
  dashboardComplianceSummary() { return this._request('GET', '/api/v1/dashboard/compliance/summary'); }
  dashboardLive() { return this._request('GET', '/api/v1/dashboard/live'); }
}

const apiClient = new ApiClient(DEFAULT_CONFIG);

// ═══════════════════════════════════════════════════════════════
// CONTEXT
// ═══════════════════════════════════════════════════════════════
const AppContext = createContext(null);
const useApp = () => useContext(AppContext);

// ═══════════════════════════════════════════════════════════════
// HOOKS
// ═══════════════════════════════════════════════════════════════
function useApi(fetcher, deps = []) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const reload = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const result = await fetcher();
      setData(result);
    } catch (e) {
      setError(e.message || 'Request failed');
    } finally {
      setLoading(false);
    }
  }, deps);

  useEffect(() => { reload(); }, [reload]);
  return { data, loading, error, reload };
}

// ═══════════════════════════════════════════════════════════════
// COMPONENTS
// ═══════════════════════════════════════════════════════════════
const SigmaGauge = ({ value, size = 88 }) => {
  const r = (size - 12) / 2;
  const C = 2 * Math.PI * r;
  const safeValue = Number.isFinite(value) ? value : 0;
  const pct = Math.min(safeValue / 6, 1);
  const offset = C * (1 - pct);
  const color = safeValue >= 5.5 ? 'var(--green)'
              : safeValue >= 4.5 ? 'var(--saffron)'
              : 'var(--coral)';
  return (
    <div className="relative" style={{ width: size, height: size }}>
      <svg className="gauge" width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} className="gauge-track" />
        <circle cx={size/2} cy={size/2} r={r} className="gauge-fill"
                stroke={color} strokeDasharray={C} strokeDashoffset={offset} />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="display text-2xl" style={{ color }}>{safeValue.toFixed(1)}</span>
        <span className="mono text-[9px] tracking-widest text-[var(--muted)] uppercase">σ</span>
      </div>
    </div>
  );
};

const Compliance = () => {
  const { api, online } = useApp();
  const [running, setRunning] = useState(false);
  const [results, setResults] = useState([]);
  const [error, setError] = useState('');

  const tests = [
    { label: 'Apollo Hospital · IN-TG → Mumbai · IN-MH',
      payload: { dataset_id: 'demo-patient-001', target_country: 'IN-MH', purpose: 'medical_treatment',
                 jurisdictions: ['DPDP_2023'], classification: 'HEALTH', has_consent: true, signature_count: 3 } },
    { label: 'Apollo Hospital · IN-TG → US pharma',
      payload: { dataset_id: 'demo-patient-001', target_country: 'US', purpose: 'pharma_research',
                 jurisdictions: ['DPDP_2023'], classification: 'PII', has_consent: false, signature_count: 0 } },
    { label: 'EU customer · EU-DE → Singapore · SG',
      payload: { dataset_id: 'demo-eu-001', target_country: 'SG', purpose: 'analytics',
                 jurisdictions: ['GDPR'], classification: 'PII', has_consent: false, signature_count: 0 } },
    { label: 'EU customer · EU-DE → France · EU-FR',
      payload: { dataset_id: 'demo-eu-001', target_country: 'EU-FR', purpose: 'analytics',
                 jurisdictions: ['GDPR'], classification: 'PII', has_consent: true, signature_count: 0 } },
  ];

  const runAll = async () => {
    setRunning(true);
    setError('');
    setResults([]);
    try {
      const all = [];
      for (const test of tests) {
        try {
          const res = await api.borderCheck(test.payload);
          all.push({ label: test.label, decision: res.decision, reason: res.reason, fabric_tx: res.fabric_tx_id });
        } catch (e) {
          all.push({ label: test.label, decision: 'ERROR', reason: e.message });
        }
      }
      setResults(all);
    } catch (e) {
      setError(e.message);
    } finally {
      setRunning(false);
    }
  };

  return (
    <div className="px-8 py-6">
      <div className="display text-2xl mb-1">Conscious compliance</div>
      <div className="mono text-[10px] uppercase tracking-widest text-[var(--muted)] mb-6">Data refuses what is not allowed</div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 stagger">
        {[
          { law: 'DPDP 2023 (India)', rules: 4, violations: 0, fixes: 0, color: 'var(--green)' },
          { law: 'GDPR (EU)',         rules: 3, violations: 1, fixes: 1, color: 'var(--green)' },
          { law: 'HIPAA (US)',        rules: 2, violations: 0, fixes: 0, color: 'var(--green)' },
          { law: 'SOX (Financial)',   rules: 1, violations: 0, fixes: 0, color: 'var(--saffron)' },
        ].map((c, i) => (
          <div key={i} className="glass-card rounded-2xl p-5">
            <div className="flex items-center justify-between mb-3">
              <span className="mono text-[10px] uppercase tracking-widest text-[var(--muted)]">{c.law}</span>
              <span className="badge" style={{ background: `${c.color}20`, color: c.color }}>active</span>
            </div>
            <div className="grid grid-cols-3 gap-3">
              <div>
                <div className="display text-2xl">{c.rules}</div>
                <div className="mono text-[9px] uppercase tracking-widest text-[var(--muted)]">Rules</div>
              </div>
              <div>
                <div className="display text-2xl" style={{ color: c.violations ? 'var(--coral)' : 'var(--ink)' }}>{c.violations}</div>
                <div className="mono text-[9px] uppercase tracking-widest text-[var(--muted)]">Violations</div>
              </div>
              <div>
                <div className="display text-2xl" style={{ color: 'var(--purple)' }}>{c.fixes}</div>
                <div className="mono text-[9px] uppercase tracking-widest text-[var(--muted)]">Auto-fixes</div>
              </div>
            </div>
          </div>
        ))}
      </div>

      <div className="glass-card rounded-2xl p-6">
        <div className="flex items-center justify-between mb-4">
          <div>
            <div className="display text-lg">Border check simulator</div>
            <div className="mono text-[10px] uppercase tracking-widest text-[var(--muted)]">
              {online ? 'Live · calls /api/v1/compliance/border' : 'Offline — connect API to run live'}
            </div>
          </div>
          <button onClick={runAll} disabled={running || !online}
                  className="px-5 py-2 rounded-full bg-[var(--ink)] text-[var(--paper)] text-xs font-medium hover:bg-[var(--navy-2)] disabled:opacity-40">
            {running ? 'Running…' : 'Run all 4 checks ▶'}
          </button>
        </div>

        {error && (
          <div className="mb-4 p-3 rounded-lg bg-[rgba(220,38,38,0.08)] text-[var(--coral)] text-xs">
            {error}
          </div>
        )}

        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {tests.map((t, i) => {
            const result = results[i];
            const allowed = result?.decision === 'ALLOWED' || result?.decision === 'ALLOWED_WITH_FIX';
            const blocked = result?.decision === 'BLOCKED';
            return (
              <div key={i} className="border border-[var(--line)] rounded-xl p-4">
                <div className="text-xs mb-2 mono">{t.label}</div>
                {!result && (
                  <div className="text-xs text-[var(--muted)]">Click "Run all 4 checks" to simulate live</div>
                )}
                {result && (
                  <>
                    <div className={`text-xs ${allowed ? 'text-[var(--green)]' : blocked ? 'text-[var(--coral)]' : 'text-[var(--gold)]'}`}>
                      <span className="badge"
                            style={{ background: allowed ? 'rgba(5,150,105,0.12)' : blocked ? 'rgba(220,38,38,0.12)' : 'rgba(255,149,27,0.12)',
                                     color: allowed ? 'var(--green)' : blocked ? 'var(--coral)' : 'var(--gold)' }}>
                        {result.decision}
                      </span>
                      <span className="ml-2">{result.reason}</span>
                    </div>
                    {result.fabric_tx && (
                      <div className="mono text-[10px] text-[var(--muted)] mt-1.5">tx: {result.fabric_tx.slice(0, 18)}...</div>

                )}

            );
          })}
        </div>
      </div>
    </div>
  );

                 className="flex-1 px-4 py-3 rounded-xl bg-white/70 border border-[var(--line)]
                            font-medium text-sm focus:outline-none focus:border-[var(--ink)]" />
          <button onClick={runQuery} disabled={running || !online}
                  className="px-6 py-3 rounded-xl bg-[var(--ink)] text-[var(--paper)] text-sm font-medium
                             hover:bg-[var(--navy-2)] disabled:opacity-40">
            {running ? 'Translating…' : 'Run query →'}
          </button>
        </div>

        {error && (
          <div className="mt-4 p-3 rounded-lg bg-[rgba(220,38,38,0.08)] text-[var(--coral)] text-xs">
            {error}
          </div>
        )}

        {result && (
          <div className="mt-6 fade-in">
            <div className="mono text-[10px] uppercase tracking-widest text-[var(--muted)] mb-2">
              Generated SQL · {result.engine} · {result.elapsed_ms}ms · detected language: {result.language}
            </div>
            <pre className="mono text-xs bg-[var(--navy)] text-[#E8E2CE] p-4 rounded-xl overflow-x-auto">
{result.sql}
            </pre>
            {result.rows && result.rows.length > 0 && (
              <>
                <div className="mono text-[10px] uppercase tracking-widest text-[var(--muted)] mt-5 mb-2">
                  Result · {result.row_count} rows
                </div>
                <div className="border border-[var(--line)] rounded-xl overflow-hidden">
                  {result.rows.map((row, i) => (
                    <div key={i} className="grid grid-cols-2 px-4 py-2.5 border-b border-[var(--line)] last:border-b-0 hover:bg-white/40">
                      {Object.entries(row).map(([k, v], j) => (
                        <div key={j} className={j === 0 ? 'font-medium text-sm' : 'text-right mono text-sm'}>
                          {typeof v === 'number' ? v.toLocaleString('en-IN') : String(v)}
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

const Intent = () => {
  const { api, online } = useApp();
  const [intent, setIntent] = useState('Send daily sales reports for top 5 regions every morning at 6am');
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');

  const samples = [
    'Send daily sales reports for top 5 regions every morning at 6am',
    'Alert me when revenue drops below 10 lakhs',
    'Make patient_records DPDP compliant',
    'Generate quality report every 15 minutes',
  ];

  const submit = async () => {
    setRunning(true); setError(''); setResult(null);
    try {
      const res = await api.submitIntent({
        intent,
        language: 'en',
        tables: ['sales_transactions'],
      });
      setResult(res);
    } catch (e) {
      setError(e.message || 'Intent failed');
    } finally {
      setRunning(false);
    }
  };

  return (
    <div className="px-8 py-6">
      <div className="display text-2xl mb-1">AI Operating System</div>
      <div className="mono text-[10px] uppercase tracking-widest text-[var(--muted)] mb-6">
        Declare intent · AI builds and deploys the pipeline
        {online && <span className="text-[var(--green)] ml-2">● live</span>}
        {!online && <span className="text-[var(--saffron)] ml-2">● API offline</span>}
      </div>

      <div className="glass-card rounded-2xl p-6">
        <div className="flex flex-wrap gap-2 mb-4">
          {samples.map((s, i) => (
            <button key={i} onClick={() => setIntent(s)}
                    className="text-xs px-3 py-1.5 rounded-full border border-[var(--line)] hover:bg-white/60 text-left">
              {s}
            </button>
          ))}
        </div>

        <div className="flex gap-3">
          <input value={intent} onChange={e => setIntent(e.target.value)}
                 onKeyDown={e => e.key === 'Enter' && online && submit()}
                 placeholder="Describe what you want — natural language..."
                 className="flex-1 px-4 py-3 rounded-xl bg-white/70 border border-[var(--line)]
                            font-medium text-sm focus:outline-none focus:border-[var(--ink)]" />
          <button onClick={submit} disabled={running || !online}
                  className="px-6 py-3 rounded-xl bg-[var(--ink)] text-[var(--paper)] text-sm font-medium
                             hover:bg-[var(--navy-2)] disabled:opacity-40">
            {running ? 'Building…' : 'Build pipeline →'}
          </button>
        </div>

        {error && (
          <div className="mt-4 p-3 rounded-lg bg-[rgba(220,38,38,0.08)] text-[var(--coral)] text-xs">
            {error}
          </div>
        )}

        {result && (
          <div className="mt-6 fade-in space-y-4">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              <div className="bg-white/60 rounded-xl p-3">
                <div className="mono text-[9px] uppercase tracking-widest text-[var(--muted)] mb-1">Intent type</div>
                <div className="font-medium text-sm">{result.intent_type}</div>
              </div>
              <div className="bg-white/60 rounded-xl p-3">
                <div className="mono text-[9px] uppercase tracking-widest text-[var(--muted)] mb-1">Schedule</div>
                <div className="font-medium text-sm mono">{result.schedule}</div>
              </div>
              <div className="bg-white/60 rounded-xl p-3">
                <div className="mono text-[9px] uppercase tracking-widest text-[var(--muted)] mb-1">Sigma target</div>
                <div className="font-medium text-sm" style={{ color: 'var(--green)' }}>{result.sigma_target}σ</div>
              </div>
              <div className="bg-white/60 rounded-xl p-3">
                <div className="mono text-[9px] uppercase tracking-widest text-[var(--muted)] mb-1">Status</div>
                <div className="font-medium text-sm" style={{ color: 'var(--green)' }}>{result.status}</div>
              </div>
            </div>
            <div>
              <div className="mono text-[10px] uppercase tracking-widest text-[var(--muted)] mb-1">Pipeline ID</div>
              <div className="mono text-xs">{result.pipeline_id}</div>
            </div>
            {result.sql && (
              <div>
                <div className="mono text-[10px] uppercase tracking-widest text-[var(--muted)] mb-2">Generated SQL</div>
                <pre className="mono text-xs bg-[var(--navy)] text-[#E8E2CE] p-4 rounded-xl overflow-x-auto">{result.sql}</pre>
              </div>
            )}
            {result.dag_url && (
              <a href={result.dag_url} target="_blank" rel="noopener"
                 className="inline-block text-xs text-[var(--purple)] hover:underline">
                Open DAG in Airflow →
              </a>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════
const App = () => {
  const [tab, setTab] = useState('Overview');
  const [apiUrl, _setApiUrl] = useState(apiClient.apiUrl);
  const [online, setOnline] = useState(null);
  const [user, setUser] = useState(null);
  const [showSettings, setShowSettings] = useState(false);

  const setApiUrl = (url) => {
    apiClient.setApiUrl(url);
    _setApiUrl(url);
    setOnline(null);  // re-test
  };

  const login = useCallback(async (username, password) => {
    const res = await apiClient.login(username, password);
    apiClient.setToken(res.access_token);
    setUser({ user_id: res.user_id, tenant_id: res.tenant_id, roles: res.roles });
    return res;
  }, []);

  const logout = useCallback(() => {
    apiClient.setToken('');
    setUser(null);
  }, []);

  // Health check on mount and whenever apiUrl changes
  useEffect(() => {
    let cancelled = false;
    const check = async () => {
      try {
        await apiClient.health();
        if (!cancelled) setOnline(true);
      } catch (e) {
        if (!cancelled) setOnline(false);
      }
    };
    check();
    const interval = setInterval(check, 30000);   // re-check every 30s
    return () => { cancelled = true; clearInterval(interval); };
  }, [apiUrl]);

  // If a token is in localStorage, try to load /auth/me
  useEffect(() => {
    if (!apiClient.token || user) return;
    apiClient.me().then(setUser).catch(() => apiClient.setToken(''));
  }, [apiUrl]);

  const ctx = {
    api: apiClient,
    apiUrl, setApiUrl,
    online,
    user, login, logout,
    openSettings: () => setShowSettings(true),
  };

  return (
    <AppContext.Provider value={ctx}>
      <div className="relative z-10 min-h-screen">
        <Header tab={tab} setTab={setTab} />
        <ConnectionBanner />
        {tab === 'Overview'   && <Overview />}
        {tab === 'Pipelines'  && <Pipelines />}
        {tab === 'Fabric'     && <Fabric />}
        {tab === 'Audit'      && <AuditView />}
        {tab === 'Compliance' && <Compliance />}
        {tab === 'Query'      && <Query />}
        {tab === 'Intent'     && <Intent />}
        <div className="px-8 py-6 mt-12 border-t border-[var(--line)] flex items-center justify-between">
          <div className="text-xs text-[var(--muted)]">
            DataNexus · Open source · Apache 2.0 · datanexus.io
          </div>
          <div className="mono text-[10px] uppercase tracking-widest text-[var(--muted)]">
            Built on Hadoop · Guided by the Gita · Six Sigma enforced
          </div>
        </div>
        {showSettings && <SettingsModal onClose={() => setShowSettings(false)} />}
      </div>
    </AppContext.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
