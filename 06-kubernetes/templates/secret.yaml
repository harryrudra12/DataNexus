apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datanexus-api.fullname" . }}-secrets
  labels:
    {{- include "datanexus-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  # In production: replace this with external-secrets-operator pulling from
  # AWS Secrets Manager / HashiCorp Vault / Sealed Secrets.
  # The strings below are base64-encoded placeholders — REPLACE before deploy.
  JWT_SECRET_KEY:    {{ .Values.secrets.jwtSecretKey    | default "Q0hBTkdFLU1FLUlOLVBST0RVQ1RJT04tVVNFLU9QRU5TU0wtUkFORC1IRVgtMzI=" | b64enc | quote }}
  POSTGRES_DSN:      {{ .Values.secrets.postgresDsn     | default "cG9zdGdyZXNxbCthc3luY3BnOi8vZGF0YW5leHVzOmNoYW5nZW1lQHBvc3RncmVzOjU0MzIvZGF0YW5leHVz" | b64enc | quote }}
  ATLAS_PASSWORD:    {{ .Values.secrets.atlasPassword   | default "Y2hhbmdlbWU=" | b64enc | quote }}
  AIRFLOW_PASSWORD:  {{ .Values.secrets.airflowPassword | default "Y2hhbmdlbWU=" | b64enc | quote }}
